<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="no">
<head>
    <title>Glemt passord</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
</head>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
<header class="container">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main class="container">
    <article style="max-width: 700px; margin: 0 auto;">
        <header>
            <h1>Glemt passord</h1>
        </header>

        <p th:if="${melding}" th:text="${melding}" class="melding">Melding</p>

        <form th:action="@{/glemt-passord}" method="post">
            <label for="epost">E-post</label>
            <input id="epost" name="epost" type="email" required autocomplete="email">
            <button type="submit" class="primary fill-parent-width">Send reset-lenke</button>
        </form>

        <p style="margin-top: 1rem;">
            <a th:href="@{/login}">Tilbake til innlogging</a>
        </p>
    </article>
</main>

<footer class="container">
    <div th:replace="~{fragments/footer :: footer}"></div>
</footer>
<script th:src="@{/js/minimal-theme-switcher.js}"></script>
</body>
</html>
