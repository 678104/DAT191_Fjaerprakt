<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="no">
<head>
    <title>Admin</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
<header class="container">
    <!-- Erstatter diven under med navbar fra fragments/navbar.html -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>
<main class="container">
    <section>
        <h1>Admin panel</h1>
        <div class="admin-action-buttons">
            <a href="/admin/panel" role="button" class="secondary">Admin panel</a>
            <a href="/admin/dommere" role="button" class="secondary">Dommere</a>
            <a href="/utstilling/registrer" role="button" class="secondary">Registrer utstilling</a>
            <a href="/admin/bedomming-oppsett" role="button" class="secondary">Oppsett bedømming</a>
        </div>
    </section>
    <th:block th:if="${fragment}">
        <th:block th:replace="~{admin/admin_fragments :: ${fragment}}"></th:block>
    </th:block>
    <th:block th:unless="${fragment}">
        <section id="main-content">
            <p>Velg en utstilling du vil jobbe med</p>
            <th:block th:replace="~{admin/admin_fragments :: adminUtstillingListe}"></th:block>
        </section>
    </th:block>
</main>
<footer class="container">
    <!-- Erstatter diven under med footer fra fragments/footer.html -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</footer>
<!-- Minimal theme switcher -->
<script th:src="@{/js/minimal-theme-switcher.js}"></script>
<script>
    // Dommer rasefordeling seksjon
    function moveItems(sourceId, targetId) {
        const source = document.getElementById(sourceId);
        const target = document.getElementById(targetId);
        const selectedItems = Array.from(source.querySelectorAll('li.selected'));

        selectedItems.forEach(item => {
            item.classList.remove('selected');
            target.appendChild(item);
        });

        updateHiddenInput(sourceId, targetId);
        oppdaterRaseMarkering();
    }

    function updateHiddenInput(sourceId, targetId) {
        const formId = sourceId.split('_')[1]; // Extract the dynamic ID part
        const selectedRaser = Array.from(document.getElementById(`selectedRaser_${formId}`).children)
            .map(item => item.getAttribute('data-value'));
        document.getElementById(`selectedRaserInput_${formId}`).value = selectedRaser.join(',');
    }

    function oppdaterRaseMarkering() {
        const tildelteRaser = new Set(
            Array.from(document.querySelectorAll('[id^="selectedRaser_"] li[data-value]'))
                .map(item => item.getAttribute('data-value'))
                .filter(Boolean)
        );

        document.querySelectorAll('[id^="availableRaser_"] li[data-value]').forEach(item => {
            const rase = item.getAttribute('data-value');
            const ikkeTildelt = !tildelteRaser.has(rase);
            item.classList.toggle('rase-ikke-tildelt', ikkeTildelt);
            item.classList.toggle('rase-tildelt', !ikkeTildelt);
            item.title = ikkeTildelt ? 'Denne rasen er ikke tildelt noen dommer' : 'Denne rasen er allerede tildelt en dommer';
        });

        document.querySelectorAll('[id^="selectedRaser_"] li[data-value]').forEach(item => {
            item.classList.remove('rase-ikke-tildelt');
            item.classList.add('rase-tildelt');
            item.title = 'Denne rasen er tildelt denne dommeren';
        });
    }

    function velgBrukerFraForslag(button) {
        const input = document.getElementById('brukerSok');
        const hidden = document.getElementById('brukerId');
        const form = input?.closest('form');

        if (input && hidden && form) {
            const brukerId = button.dataset.brukerId || '';
            const brukerNavn = button.dataset.brukerNavn || '';
            input.value = brukerNavn;
            input.dataset.valgtBrukerNavn = brukerNavn;
            form.dataset.valgtBrukerId = brukerId;
            form.dataset.valgtBrukerNavn = brukerNavn;
            hidden.value = brukerId;
            lukkBrukerForslag();
            skjulBrukerFeil();
        }
    }

    function hentBrukerForslag() {
        return Array.from(document.querySelectorAll('#brukerForslagContainer .autocomplete-option'));
    }

    function fjernAktivBrukerForslag() {
        hentBrukerForslag().forEach(option => {
            option.classList.remove('autocomplete-option--active');
            option.removeAttribute('aria-selected');
        });
        const input = document.getElementById('brukerSok');
        if (input) {
            input.removeAttribute('aria-activedescendant');
        }
    }

    function lukkBrukerForslag() {
        fjernAktivBrukerForslag();
        const container = document.getElementById('brukerForslagContainer');
        if (container) {
            container.innerHTML = '';
        }
    }

    function settAktivBrukerForslag(index) {
        const options = hentBrukerForslag();
        if (!options.length) {
            fjernAktivBrukerForslag();
            return;
        }

        const safeIndex = ((index % options.length) + options.length) % options.length;
        fjernAktivBrukerForslag();

        const active = options[safeIndex];
        active.classList.add('autocomplete-option--active');
        active.setAttribute('aria-selected', 'true');
        if (!active.id) {
            active.id = `brukerForslag_${safeIndex}`;
        }

        const input = document.getElementById('brukerSok');
        if (input) {
            input.setAttribute('aria-activedescendant', active.id);
        }
    }

    function valgtAktivBrukerForslag() {
        return document.querySelector('#brukerForslagContainer .autocomplete-option.autocomplete-option--active');
    }

    function velgAktivBrukerForslag() {
        const active = valgtAktivBrukerForslag();
        if (active) {
            velgBrukerFraForslag(active);
            return true;
        }

        const options = hentBrukerForslag();
        if (options.length === 1) {
            velgBrukerFraForslag(options[0]);
            return true;
        }

        return false;
    }

    function nullstillBrukerId() {
        const hidden = document.getElementById('brukerId');
        const input = document.getElementById('brukerSok');
        const form = input?.closest('form');

        if (input && form && input.value === (form.dataset.valgtBrukerNavn || '')) {
            skjulBrukerFeil();
            return;
        }

        if (hidden) {
            hidden.value = '';
        }
        if (input) {
            delete input.dataset.valgtBrukerNavn;
        }
        if (form) {
            delete form.dataset.valgtBrukerId;
            delete form.dataset.valgtBrukerNavn;
        }
        skjulBrukerFeil();
    }

    function nullstillBrukerVelger() {
        const input = document.getElementById('brukerSok');
        const hidden = document.getElementById('brukerId');
        const form = input?.closest('form');

        if (input) {
            input.value = '';
            delete input.dataset.valgtBrukerNavn;
        }
        if (hidden) {
            hidden.value = '';
        }
        if (form) {
            delete form.dataset.valgtBrukerId;
            delete form.dataset.valgtBrukerNavn;
        }
        lukkBrukerForslag();
        skjulBrukerFeil();
    }

    function visBrukerFeil(melding) {
        const feil = document.getElementById('brukerFeilmelding');
        const input = document.getElementById('brukerSok');
        if (!feil) {
            return;
        }

        feil.textContent = melding;
        feil.hidden = false;
        if (input) {
            input.setAttribute('aria-invalid', 'true');
        }
    }

    function skjulBrukerFeil() {
        const feil = document.getElementById('brukerFeilmelding');
        const input = document.getElementById('brukerSok');
        if (!feil) {
            return;
        }

        feil.textContent = '';
        feil.hidden = true;
        if (input) {
            input.removeAttribute('aria-invalid');
        }
    }

    function bindBrukerAutocomplete(input) {
        if (!input || input.dataset.autocompleteBound === 'true') {
            return;
        }

        input.dataset.autocompleteBound = 'true';
        const containerId = input.getAttribute('aria-controls');
        let debounceTimer = null;
        let abortController = null;

        const updateForslag = async () => {
            const query = (input.value || '').trim();
            const container = containerId ? document.getElementById(containerId) : null;

            if (!container) {
                return;
            }

            if (abortController) {
                abortController.abort();
            }

            if (!query) {
                container.innerHTML = '';
                return;
            }

            abortController = new AbortController();

            try {
                const response = await fetch(`/admin/brukere?sok=${encodeURIComponent(query)}`, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    credentials: 'same-origin',
                    signal: abortController.signal
                });

                if (!response.ok) {
                    return;
                }

                const html = await response.text();
                const target = document.getElementById(containerId);
                if (target) {
                    target.outerHTML = html;
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Kunne ikke hente brukerforslag', error);
                }
            }
        };

        input.addEventListener('input', function () {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateForslag, 250);
        });
    }

    function initBrukerAutocomplete(root = document) {
        root.querySelectorAll('input[data-autocomplete-url="/admin/brukere"]').forEach(bindBrukerAutocomplete);
    }

    function sjekkBrukerValgt() {
        const hidden = document.getElementById('brukerId');
        const input = document.getElementById('brukerSok');
        const form = input?.closest('form');

        if (!hidden || !input || !form) {
            visBrukerFeil('Velg bruker å tildele rolle');
            return false;
        }

        if (!hidden.value && form.dataset.valgtBrukerId) {
            hidden.value = form.dataset.valgtBrukerId;
        }

        if (hidden && hidden.value) {
            skjulBrukerFeil();
            return true;
        }

        visBrukerFeil('Velg bruker å tildele rolle');
        return false;
    }

    document.addEventListener('keydown', function (event) {
        const input = document.getElementById('brukerSok');
        if (!input || document.activeElement !== input) {
            return;
        }

        const options = hentBrukerForslag();
        if (!options.length) {
            return;
        }

        const activeIndex = options.findIndex(option => option.classList.contains('autocomplete-option--active'));

        if (event.key === 'ArrowDown') {
            event.preventDefault();
            settAktivBrukerForslag(activeIndex < 0 ? 0 : activeIndex + 1);
        }

        if (event.key === 'ArrowUp') {
            event.preventDefault();
            settAktivBrukerForslag(activeIndex < 0 ? options.length - 1 : activeIndex - 1);
        }

        if (event.key === 'Enter') {
            if (velgAktivBrukerForslag()) {
                event.preventDefault();
            }
        }

        if (event.key === 'Escape') {
            fjernAktivBrukerForslag();
        }
    });

    htmx.onLoad(function (content) {
        initBrukerAutocomplete(content);

        if (content.querySelector('#brukerForslagContainer')) {
            fjernAktivBrukerForslag();
        }

        if (content.querySelector('[id^="availableRaser_"]') || content.querySelector('[id^="selectedRaser_"]')) {
            oppdaterRaseMarkering();
        }
    });

    document.addEventListener('DOMContentLoaded', function () {
        initBrukerAutocomplete(document);
        oppdaterRaseMarkering();
    });

    document.addEventListener('click', function (event) {
        if (event.target.tagName === 'LI') {
            event.target.classList.toggle('selected');
        }
    });

    // Rasesortering seksjon
    htmx.onLoad(function (content) {
        const sortableList = content.querySelector('#sortable-list');
        const sortedRaseIdsInput = content.querySelector('#sorterteRaser');

        if (sortableList && sortedRaseIdsInput) {
            let draggedItem = null;

            sortableList.addEventListener('dragstart', (e) => {
                draggedItem = e.target;
                e.target.style.opacity = '0.5';
            });

            sortableList.addEventListener('dragend', (e) => {
                e.target.style.opacity = '';
                draggedItem = null;
            });

            sortableList.addEventListener('dragover', (e) => {
                e.preventDefault();
                const afterElement = getDragAfterElement(sortableList, e.clientY);
                if (afterElement == null) {
                    sortableList.appendChild(draggedItem);
                } else {
                    sortableList.insertBefore(draggedItem, afterElement);
                }
            });

            sortableList.addEventListener('drop', () => {
                const sortedIds = Array.from(sortableList.children).map(item => item.dataset.id);
                sortedRaseIdsInput.value = sortedIds.join('|');
            });

            function getDragAfterElement(container, y) {
                const draggableElements = [...container.querySelectorAll('.sortable-item:not(.dragging)')];

                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return {offset: offset, element: child};
                    } else {
                        return closest;
                    }
                }, {offset: Number.NEGATIVE_INFINITY}).element;
            }
        }
    });
</script>
</body>
</html>
