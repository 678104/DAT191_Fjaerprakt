### Profil for produksjon

# Postgres database
spring.datasource.driver-class-name           = org.postgresql.Driver
spring.datasource.url                         = jdbc:postgresql://localhost:5432/peristeri
spring.datasource.username                    = peristeri
spring.datasource.password                    = peristeri_password
spring.datasource.generate-unique-name        = false
spring.datasource.name                        = peristeri

# JPA konfigurasjon
spring.jpa.database                           = Postgresql
spring.jpa.hibernate.ddl-auto                 = validate
spring.jpa.show-sql                           = false
spring.jpa.open-in-view                       = true
spring.jpa.properties.hibernate.format_sql    = false

# Ikke vis stacktrace på nettside hvis app kræsjer
server.error.include-stacktrace               = never
server.error.include-message                  = never
server.error.include-binding-errors           = never

# Actuator configuration for production
management.endpoints.web.exposure.include     = health,info
management.endpoint.health.show-details       = never
management.endpoint.health.probes.enabled     = true

# Optional: Require authentication for sensitive endpoints
management.endpoints.web.base-path            = /actuator
management.endpoints.web.cors.allowed-origins = *
management.endpoints.web.cors.allowed-methods = GET

# Disable DevTools
spring.devtools.restart.enabled               = false
spring.devtools.livereload.enabled            = false
spring.devtools.add-properties                = false
