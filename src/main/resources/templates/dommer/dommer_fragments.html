<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="no">
<head>
    <title>Dommer Fragmenter</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">

<!-- ✅ Due List Fragment -->
<div id="dueliste" th:fragment="dueliste">
  <!--/*@thymesVar id="duerPerRase" type="java.util.Map<java.lang.String, java.util.List<no.hvl.peristeri.feature.due.Due>>"*/-->
  <div th:if="${#maps.isEmpty(duerPerRase)}">
        <p>Du har ikke blitt tildelt duer</p>
    </div>
  <th:block th:unless="${#maps.isEmpty(duerPerRase)}">
        <form hx-get="/dommer/liste"
              hx-target="#dueliste"
              hx-swap="outerHTML">
      <input type="hidden" name="utstillingId" th:value="${valgtUtstillingId}">
            <fieldset role="group">
                <input type="search"
                       id="dommer-filter"
                       name="filter"
                       pattern="\d*"
                       placeholder="Søk etter burnummer..."
                       autocomplete="off">
                <input type="submit" class="outline-small" value="Søk">
                <input type="button"
                               th:attr="hx-get='/dommer/liste?utstillingId=' + ${valgtUtstillingId}"
                       hx-target="#dueliste"
                       hx-swap="outerHTML"
                       class="secondary outline-small"
                       value="Vis alle">
            </fieldset>
        </form>
                    <th:block th:each="entry : ${duerPerRase}">
                      <article>
                        <header>
                          <h2 th:text="${entry.key}">Rase</h2>
                        </header>
                        <table>
                          <thead>
                          <tr>
                            <th>Burnummer</th>
                            <th>Rase</th>
                            <th>Farge</th>
                            <th>Status</th>
                            <th>Poeng</th>
                            <th>Ferdig bedømt</th>
                            <th>Bedøm</th>
                          </tr>
                          </thead>
                          <tbody>
                          <tr th:each="due: ${entry.value}">
                            <td th:text="${due.burnummer}"></td>
                            <td th:text="${due.rase}"></td>
                            <td th:text="${due.farge}"></td>
                            <td th:text="${due.bedommelse != null ? 'Bedømt' : 'Mangler bedømming'}"></td>
                            <td th:text="${due.bedommelse != null ? due.bedommelse?.poeng : 'Ikke dømt'}"></td>
                            <td th:if="${due.bedommelse != null && due.bedommelse.poeng != null}">
                              <span style="color: green; font-size: 1.2em; font-weight: bold;">✓</span>
                            </td>
                            <td th:unless="${due.bedommelse != null && due.bedommelse.poeng != null}"></td>
                            <td>
                              <button
                                  th:attr="hx-get='/dommer/bedom?dueId=' + ${due.id} + '&utstillingId=' + ${valgtUtstillingId},hx-push-url='/dommer/utstilling/' + ${valgtUtstillingId}"
                                  th:class="${due.bedommelse == null} ? 'primary' : 'secondary'"
                                  hx-target="#content"
                                  th:text="${due.bedommelse == null ? 'Bedøm' : 'Rediger'}">
                              </button>
                            </td>
                          </tr>
                          </tbody>
                        </table>
                      </article>
                    </th:block>
    </th:block>
</div>

<!-- ✅ Dommer Bedømmelse Fragment -->
<div id="dommerBedommelse" th:fragment="dommerBedommelse">
    <article>
        <header>
            <h2>Bedømmelse av due</h2>
        </header>
        <form id="bedomDue"
              hx-post="/dommer/bedom"
              hx-target="#content"
              hx-swap="innerHTML">
            <!--/*@thymesVar id="bedommelse" type="no.hvl.peristeri.feature.dommer.Bedommelse"*/-->
            <!--/*@thymesVar id="due" type="no.hvl.peristeri.feature.due.Due"*/-->
            <input type="hidden" name="dueId" th:value="${due.id}"/>
            <input type="hidden" name="utstillingId" th:value="${valgtUtstillingId}"/>
            <input type="hidden" name="id" th:value="${bedommelse.id}"/>
            <div class="grid">
                <div>
                    <p><strong>Ringnummer:</strong> <span th:text="${due.ringnummer}"></span></p>
                    <p><strong>Rase:</strong> <span th:text="${due.rase}"></span></p>
                    <p><strong>Farge:</strong> <span th:text="${due.farge}"></span></p>
                </div>
                <div>
                    <p><strong>Variant:</strong> <span th:text="${due.variant}"></span></p>
                    <p><strong>Kjønn:</strong> <span th:text="${due.kjonn} ? '1,0' : '0,1'"></span></p>
                    <p><strong>Alder:</strong> <span th:text="${due.alder} ? 'Eldre' : 'Ung'"></span></p>
                </div>
            </div>

            <h3>Hovedkategorier</h3>
            <th:block th:each="kategori : ${hovedkategorier}">
                <label th:text="${kategori.visningsnavn}"></label>
                <div>
                    <label th:each="kommentar, iter : ${standardKommentarerPerKategori[kategori.name()]}"
                           th:for="${'standard_' + kategori.name() + '_' + iter.index}"
                           style="display: block; margin-bottom: 0.2rem;">
                        <input type="checkbox"
                               th:id="${'standard_' + kategori.name() + '_' + iter.index}"
                               th:name="${'standardKommentar_' + kategori.name()}"
                               th:value="${kommentar}"
                               th:checked="${eksisterendeStandardKommentarer[kategori.name()] != null and #lists.contains(eksisterendeStandardKommentarer[kategori.name()], kommentar)}">
                        <span th:text="${kommentar}"></span>
                    </label>
                </div>

                <label th:for="${'fritekst_' + kategori.name()}"
                       th:text="'Fritekst'"></label>
                <textarea th:id="${'fritekst_' + kategori.name()}"
                          th:name="${'fritekstKommentar_' + kategori.name()}"
                          th:text="${eksisterendeKategorier[kategori.name()] != null ? eksisterendeKategorier[kategori.name()].fritekstKommentar : ''}"></textarea>
            </th:block>

            <input type="hidden" name="onsker" th:value="${bedommelse.onsker}">
            <input type="hidden" name="feil" th:value="${bedommelse.feil}">

            <label for="poeng">Poeng:</label>
            <input type="number" id="poeng" name="poeng" min="90" max="100" th:value="${bedommelse.poeng}" required>

            <div class="grid">
                <input type="submit" value="Lagre bedømming">
                <button th:attr="hx-get='/dommer/liste?utstillingId=' + ${valgtUtstillingId}"
                        hx-target="#content"
                        hx-swap="innerHTML"
                        class="secondary fix-button-spacing">
                    Tilbake til listen
                </button>
            </div>
        </form>
    </article>
</div>
</body>
</html>
