<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="no">
<head>
    <title>Dommer</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
<header class="container">
    <!-- Erstatter diven under med navbar fra fragments/navbar.html -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>
<main class="container">
    <section>
        <h1>Dine dommerutstillinger</h1>
        <div th:if="${#lists.isEmpty(dommerPaameldinger)}">
            <p>Du er ikke tildelt noen utstillinger enda.</p>
        </div>
        <th:block th:unless="${#lists.isEmpty(dommerPaameldinger)}">
            <section>
                <h2>Aktive og kommende utstillinger</h2>
                <div th:if="${#lists.isEmpty(aktiveOgKommendeDommerPaameldinger)}">
                    <p>Ingen aktive eller kommende tildelinger.</p>
                </div>
                <div class="utstillinger-grid" th:unless="${#lists.isEmpty(aktiveOgKommendeDommerPaameldinger)}">
                    <article class="utstilling-card" th:each="dp : ${aktiveOgKommendeDommerPaameldinger}">
                        <header>
                            <h3 th:text="${dp.utstilling.tittel}">Utstilling</h3>
                        </header>
                        <div class="utstilling-info">
                            <p><strong>Dato:</strong> <span th:text="${#temporals.format(dp.utstilling.datoRange.startDate, 'dd.MM.yyyy')}"></span> - <span th:text="${#temporals.format(dp.utstilling.datoRange.endDate, 'dd.MM.yyyy')}"></span></p>
                            <p th:if="${dp.utstilling.beskrivelse}"><strong>Beskrivelse:</strong> <span th:text="${dp.utstilling.beskrivelse}"></span></p>
                        </div>
                        <footer>
                            <a th:href="@{/dommer/utstilling/{id}(id=${dp.utstilling.id})}" role="button">Gå til utstilling</a>
                        </footer>
                    </article>
                </div>
            </section>

            <section>
                <h2>Historiske utstillinger</h2>
                <div th:if="${#lists.isEmpty(historiskeDommerPaameldinger)}">
                    <p>Ingen historiske tildelinger.</p>
                </div>
                <ul th:unless="${#lists.isEmpty(historiskeDommerPaameldinger)}">
                    <li th:each="dp : ${historiskeDommerPaameldinger}">
                        <a th:href="@{/dommer/utstilling/{id}(id=${dp.utstilling.id})}"
                           th:text="${dp.utstilling.tittel + ' (' + #temporals.format(dp.utstilling.datoRange.startDate, 'dd.MM.yyyy') + ' - ' + #temporals.format(dp.utstilling.datoRange.endDate, 'dd.MM.yyyy') + ')'}">
                        </a>
                    </li>
                </ul>
            </section>
    </section>
</main>
<footer class="container">
    <!-- Erstatter diven under med footer fra fragments/footer.html -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</footer>
<!-- Minimal theme switcher -->
<script th:src="@{/js/minimal-theme-switcher.js}"></script>
</body>
</html>
