<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="no">
<head>
    <title>Påmelding</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <script src="/js/paamelding.js"></script>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
<header class="container">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
</header>
<main class="container">
    <section>
        <h4>Påmeldte duer</h4>
        <div th:fragment="due-tabell" class="container-fluid" id="duetabell">
            <div th:if="${#lists.isEmpty(session.dueDTOListe?.liste)}" class="muted-placeholder">
                Ingen registrerte duer enda.
            </div>
            <article th:unless="${#lists.isEmpty(session.dueDTOListe?.liste)}">
                <header><strong>Registrerte duer</strong></header>
            </article>
            <table th:unless="${#lists.isEmpty(session.dueDTOListe?.liste)}">
                <thead>
                <tr>
                    <th>Rase</th>
                    <th>Farge</th>
                    <th>Variant</th>
                    <th>Hanner ung</th>
                    <th>Hanner eldre</th>
                    <th>Hunner ung</th>
                    <th>Hunner eldre</th>
                    <th>Ikke eget avl?</th>
                    <th></th>
                </tr>
                </thead>
                <tr th:each="due : ${session.dueDTOListe?.liste}">
                    <td><span th:text="${due.rase}">Rase</span></td>
                    <td><span th:text="${due.farge}">Farge</span></td>
                    <td><span th:text="${due.variant}">Variant</span></td>
                    <td><span th:text="${due.hannerUng}">Hanner ung</span></td>
                    <td><span th:text="${due.hannerEldre}">Hanner eldre</span></td>
                    <td><span th:text="${due.hunnerUng}">Hunner ung</span></td>
                    <td><span th:text="${due.hunnerEldre}">Hunner eldre</span></td>
                    <td><span th:text="${due.ikkeEget} ? 'Ja' : 'Nei'">0</span></td>
                    <td>
                        <button th:hx-get="@{/paamelding/redigerDue/{id}(id=${due.radId})}" hx-target="closest tr"
                                hx-swap="outerHTML">
                            <span th:text="'Rediger'"></span>
                        </button>
                    </td>
                </tr>
            </table>

                  <button class="meld-pa-knapp" hx-post="/paamelding/submitPaamelding" hx-target="main" hx-swap="outerHTML"
                      th:text="${session.redigerPaameldingId != null} ? 'Lagre endringer' : 'Meld deg på!'">
                    Meld deg på!
                  </button>
        </div>
    </section>

    <div>
        <table>
            <tbody>
            <tr th:fragment="redigerDueRad">
                <td>
                    <label for="rediger-rase" style="position:absolute;left:-10000px;">Rase</label>
                    <input id="rediger-rase" type="text" th:value="${dueDTO.rase}" name="rase">
                </td>
                <td>
                    <label for="rediger-farge" style="position:absolute;left:-10000px;">Farge</label>
                    <input id="rediger-farge" type="text" th:value="${dueDTO.farge}" name="farge">
                </td>
                <td>
                    <label for="rediger-variant" style="position:absolute;left:-10000px;">Variant</label>
                    <input id="rediger-variant" type="text" th:value="${dueDTO.variant}" name="variant">
                </td>
                <td>
                    <label for="rediger-hanner-ung" style="position:absolute;left:-10000px;">Hanner ung</label>
                    <input id="rediger-hanner-ung" type="number" th:value="${dueDTO.hannerUng}" name="hannerUng" oninput="sjekkNegativ(this)">
                </td>
                <td>
                    <label for="rediger-hanner-eldre" style="position:absolute;left:-10000px;">Hanner eldre</label>
                    <input id="rediger-hanner-eldre" type="number"
                           th:value="${dueDTO.hannerEldre}"
                           name="hannerEldre"
                           oninput="sjekkNegativ(this)">
                </td>
                <td>
                    <label for="rediger-hunner-ung" style="position:absolute;left:-10000px;">Hunner ung</label>
                    <input id="rediger-hunner-ung" type="number" th:value="${dueDTO.hunnerUng}" name="hunnerUng" oninput="sjekkNegativ(this)">
                </td>
                <td>
                    <label for="rediger-hunner-eldre" style="position:absolute;left:-10000px;">Hunner eldre</label>
                    <input id="rediger-hunner-eldre" type="number"
                           th:value="${dueDTO.hunnerEldre}"
                           name="hunnerEldre"
                           oninput="sjekkNegativ(this)">
                </td>
                <td>
                    <label for="rediger-ikke-eget" style="position:absolute;left:-10000px;">Ikke eget avl</label>
                    <input id="rediger-ikke-eget" type="checkbox" th:checked="${dueDTO.ikkeEget}" name="ikkeEget"
                           aria-label="Kryss av hvis duen ikke er eget avl">
                </td>
                <td>
                    <div class="due-row-actions">
                        <button th:hx-post="@{/paamelding/oppdaterDue/{id}(id=${dueDTO.radId})}" hx-target="closest tr"
                                hx-swap="outerHTML" hx-include="closest tr">Lagre
                        </button>
                        <button type="button"
                                class="due-delete-button"
                                th:hx-post="@{/paamelding/fjernDue/{id}(id=${dueDTO.radId})}"
                                hx-target="#duetabell"
                                hx-swap="outerHTML"
                                hx-confirm="Vil du slette denne duen fra påmeldingen?">Slett
                        </button>
                    </div>
                    <input type="hidden" id="radId" name="radId" th:value="${dueDTO.radId}">
                </td>
            </tr>
            <tr th:fragment="oppdatertDueRad">
                <td><span th:text="${due.rase}">Rase</span></td>
                <td><span th:text="${due.farge}">Farge</span></td>
                <td><span th:text="${due.variant}">Variant</span></td>
                <td><span th:text="${due.hannerUng}">Hanner ung</span></td>
                <td><span th:text="${due.hannerEldre}">Hanner eldre</span></td>
                <td><span th:text="${due.hunnerUng}">Hunner ung</span></td>
                <td><span th:text="${due.hunnerEldre}">Hunner eldre</span></td>
                <td><span th:text="${due.ikkeEget} ? 'Ja' : 'Nei'">0</span></td>
                <td>
                    <button th:hx-get="@{/paamelding/redigerDue/{id}(id=${due.radId})}" hx-target="closest tr"
                            hx-swap="outerHTML">
                        <span th:text="'Rediger'"></span>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>


</main>
<footer class="container">
    <div th:replace="~{fragments/footer :: footer}"></div>
</footer>
<script th:src="@{/js/minimal-theme-switcher.js}"></script>
</body>
</html>
