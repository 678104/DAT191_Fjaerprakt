<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="no">
<body style="font-family: Arial, sans-serif; color: #111;">
<h2>Tilbakestill passord</h2>
<p>Vi mottok en foresporsel om a bytte passordet ditt.</p>
<p>
    Trykk pa lenken under for a sette nytt passord:
</p>
<p>
    <a th:href="${resetUrl}" th:text="${resetUrl}">Reset-lenke</a>
</p>
<p th:text="'Lenken utloper om ' + ${expiresInMinutes} + ' minutter.'">Lenken utloper snart.</p>
<p>Hvis du ikke ba om passordbytte, kan du ignorere denne e-posten.</p>
</body>
</html>
