<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="no">
<head>
    <title>Sett nytt passord</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
</head>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
<header class="container">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
</header>

<main class="container">
    <article style="max-width: 700px; margin: 0 auto;">
        <header>
            <h1>Sett nytt passord</h1>
        </header>

        <section th:if="${error}">
            <p th:text="${error}" class="feilmelding">Feilmelding</p>
        </section>

        <section th:if="${tokenInvalid}">
            <p>Be om en ny lenke for passordbytte.</p>
            <a th:href="@{/glemt-passord}">Gå til glemt passord</a>
        </section>

        <form th:unless="${tokenInvalid}" th:action="@{/reset-passord}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <label for="passord">Nytt passord</label>
            <input id="passord" name="passord" type="password" autocomplete="new-password" required>

            <label for="bekreftPassord">Bekreft passord</label>
            <input id="bekreftPassord" name="bekreftPassord" type="password" autocomplete="new-password" required>

            <button type="submit" class="primary fill-parent-width">Lagre nytt passord</button>
        </form>
    </article>
</main>

<footer class="container">
    <div th:replace="~{fragments/footer :: footer}"></div>
</footer>
<script th:src="@{/js/minimal-theme-switcher.js}"></script>
</body>
</html>
