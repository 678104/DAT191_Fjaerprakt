### Felles konfigurasjon for alle profiler

# Generell app konfigurasjon
spring.application.name                    = Peristeri
server.port                                = 8080
server.servlet.context-path                = /

# Thymeleaf konfigurasjon
spring.thymeleaf.mode                      = HTML
spring.thymeleaf.prefix                    = classpath:/templates/
spring.thymeleaf.suffix                    = .html
spring.thymeleaf.enable-spring-el-compiler = true

# Mail autokonfigurasjon (overstyres med miljo ved ekte SMTP)
spring.mail.host                            = localhost
spring.mail.port                            = 25

# Tegnsett
server.servlet.encoding.charset            = UTF-8
server.servlet.encoding.enabled            = true
server.servlet.encoding.force              = true

# https forward headers
server.forward-headers-strategy            = native

# Default profil (overstyres via cmdline flag (-Dspring.profiles.active=), env variabel (SPRING_PROFILES_ACTIVE=), intellij run config)
spring.profiles.active                     = dev

# For aa lage en default admin bruker
# eller bruk cmdline flag (-Dapp.admin.email=, -Dapp.admin.name=, -Dapp.admin.password=)
# eller env variabler (APP_ADMIN_EMAIL=, APP_ADMIN_NAME=, APP_ADMIN_PASSWORD=)
#app.admin.email                  =
#app.admin.name                   =
#app.admin.password               =

# Passord-reset
app.password-reset.base-url                 = http://localhost:8080
app.password-reset.mail-from                = no-reply@peristeri.local
app.password-reset.token-secret             = change-me-in-production
app.password-reset.mail-enabled             = false
app.password-reset.log-reset-link-in-dev    = true
app.password-reset.token-ttl-minutes        = 30
app.password-reset.rate-limit-max-attempts  = 3
app.password-reset.rate-limit-window-minutes = 15

