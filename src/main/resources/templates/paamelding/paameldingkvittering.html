<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="no">
<head>
    <title>Påmelding</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <script src="/js/paamelding.js"></script>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
<header class="container">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
</header>
<main class="container">
    <th:block th:fragment="kvittering">
        <section>
            <h3>Legg til påmeldte duer</h3>
            <p>Fullfør påmeldingen ved å fylle ut informasjonen under</p>
            <article>
                <header><b th:text="${session.utstilling.tittel}"></b></header>
                <p><strong>Arrangør:</strong> <span th:text="${session.utstilling.arrangoer}"></span></p>
                <p><strong>Sted:</strong> <span th:text="${session.utstilling.adresse}"></span></p>
                <p><strong>Startdato:</strong> <span
                        th:text="${#temporals.format(session.utstilling.datoRange.startDate, 'dd.MM.yyyy')}"></span></p>
                <p><strong>Sluttdato:</strong> <span
                        th:text="${#temporals.format(session.utstilling.datoRange.endDate, 'dd.MM.yyyy')}"></span></p>
            </article>

            <!--/*@thymesVar id="utstiller" type="no.hvl.peristeri.feature.bruker.Bruker"*/-->
            <div id="person-info" th:fragment="personinfo" th:object="${utstiller}">
                <article class="grid">
                    <div>
                        <div>
                            <strong>Fornavn:</strong> <span th:text="*{fornavn}"></span>
                        </div>
                        <div>
                            <strong>Adresse:</strong> <span th:text="*{adresse}"></span>
                        </div>
                        <div>
                            <strong>E-post:</strong> <span th:text="*{epost}"></span>
                        </div>
                    </div>

                    <div>
                        <div>
                            <strong>Etternavn:</strong> <span th:text="*{etternavn}"></span>
                        </div>
                        <div>
                            <strong>Telefon:</strong> <span th:text="*{telefon}"></span>
                        </div>
                        <div>
                            <strong>Forening:</strong> <span th:text="*{forening}"></span>
                        </div>
                    </div>
                </article>
            </div>
        </section>
        <section>
            <div id="duetabell">
                <article class="muted-placeholder">
                    Ingen duer er lagt til ennå.
                </article>
            </div>
        </section>

        <section>
            <form id="duepaamelding" class="duepaamelding-form" method="post" hx-post="/paamelding/duekvittering" hx-trigger="submit"
                  hx-target="#duetabell" hx-swap="outerHTML"
                  onsubmit="return validateForm(event)">

                <div class="grid due-form-row due-form-row--top">
                    <label for="ny-due-gruppe">Gruppe
                        <select id="ny-due-gruppe"
                                name="gruppeId"
                                required
                                th:hx-get="@{/paamelding/raser}"
                                hx-target="#ny-due-rase"
                                hx-swap="outerHTML"
                                hx-trigger="change"
                                hx-include="this">
                            <option value="">Velg gruppe</option>
                            <option th:each="gruppe : ${dueGrupper}"
                                    th:value="${gruppe.id}"
                                    th:text="${gruppe.navn}"
                                    th:selected="${gruppe.id == valgtGruppeId}"></option>
                        </select>
                    </label>

                    <label for="ny-due-rase">Rase
                        <select id="ny-due-rase" name="rase" required th:fragment="ny-due-rase-select">
                            <option value="">Velg rase</option>
                            <option th:each="rase : ${dueRaser}" th:value="${rase.navn}" th:text="${rase.navn}"></option>
                        </select>
                    </label>

                    <label for="ny-due-farge">Farge
                        <select id="ny-due-farge" name="farge" required>
                            <option value="">Velg farge</option>
                            <option th:each="farge : ${dueFarger}" th:value="${farge.navn}" th:text="${farge.navn}"></option>
                        </select>
                    </label>

                    <label for="ny-due-variant">Variant
                        <select id="ny-due-variant" name="variant" required>
                            <option value="">Velg variant</option>
                            <option th:each="variant : ${dueVarianter}" th:value="${variant.navn}" th:text="${variant.navn}"></option>
                        </select>
                    </label>
                </div>

                <div class="grid due-form-row due-form-row--bottom">
                    <label for="ny-due-hanner-ung">Hanner (Ung)
                        <input id="ny-due-hanner-ung" type="number" name="hannerUng" value="0" min="0" oninput="sjekkNegativ(this)">
                    </label>

                    <label for="ny-due-hanner-eldre">Hanner (Eldre)
                        <input id="ny-due-hanner-eldre" type="number" name="hannerEldre" value="0" min="0" oninput="sjekkNegativ(this)">
                    </label>

                    <label for="ny-due-hunner-ung">Hunner (Ung)
                        <input id="ny-due-hunner-ung" type="number" name="hunnerUng" value="0" min="0" oninput="sjekkNegativ(this)">
                    </label>

                    <label for="ny-due-hunner-eldre">Hunner (Eldre)
                        <input id="ny-due-hunner-eldre" type="number" name="hunnerEldre" value="0" min="0" oninput="sjekkNegativ(this)">
                    </label>

                    <label for="ny-due-ikke-eget" class="due-checkbox-field">Ikke eget avl?
                        <input id="ny-due-ikke-eget" type="checkbox" name="ikkeEget" aria-label="Kryss av hvis duen ikke er eget avl">
                    </label>
                </div>

                <div id="error-message" style="display: none; color: red;">Vennligst legg til minst en due</div>
                <button type="submit">Legg til duer</button>
                <input type="hidden" id="radId" name="radId" th:value="${radId}">
            </form>
        </section>
    </th:block>

</main>
<footer class="container">
    <div th:replace="~{fragments/footer :: footer}"></div>
</footer>
<script th:src="@{/js/minimal-theme-switcher.js}"></script>
</body>
</html>
