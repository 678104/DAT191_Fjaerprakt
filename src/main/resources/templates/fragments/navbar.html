<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="no">
<head>
    <title>Navbar</title>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
<body th:attr="hx-headers='{&quot;' + ${_csrf.headerName} + '&quot;: &quot;' + ${_csrf.token} + '&quot;}'">
<header class="container">
    <nav th:fragment="navbar" id="navbar">
        <ul>
            <li>
                <a th:href="@{/}" href="/" aria-label="Gå til forsiden">
                    <img src="/favicon.ico" alt="Peristeri logo" class="nav-icon">
                    <strong>Peristeri</strong>
                </a>
            </li>
        </ul>
        <ul>
            <!--/*@thymesVar id="navLocation" type="String"*/-->
            <li>
                <a href="/" class=""
                   th:classappend="${navLocation == 'home'} ? 'navCurrent' : ''">Hjem</a>
            </li>
            <li>
                <a href="/utstilling" class=""
                   th:classappend="${navLocation == 'utstilling'} ? 'navCurrent' : ''">Utstillinger</a>
            </li>
            <li th:if="${#authorization.expression('hasRole(''DOMMER'')')}">
                <a href="/dommer" class=""
                   th:classappend="${navLocation == 'dommer'} ? 'navCurrent' : ''">Dommer</a>
            </li>
            <li th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                <a href="/admin" class=""
                   th:classappend="${navLocation == 'admin'} ? 'navCurrent' : ''">Admin</a>
            </li>
            <li sec:authorize="!isAuthenticated()">
                <a href="/login" role="button"
                   th:classappend="${navLocation == 'login'} ? 'contrast' : ''">Logg inn</a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a href="/bruker" role="button"
                   th:classappend="${navLocation == 'bruker'} ? 'contrast' : ''">
                    <span th:if="${#authorization.expression('hasRole(''ADMIN'')')}">Din bruker: Admin</span>
                    <span th:if="${#authorization.expression('hasRole(''DOMMER'') and not hasRole(''ADMIN'')')}">Din bruker: Dommer</span>
                    <span th:if="${not #authorization.expression('hasRole(''ADMIN'') or hasRole(''DOMMER'')')}">Din bruker</span>
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a href="/bruker/din-paamelding" role="button">Din påmelding</a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" role="button" class="contrast logout-btn" style="border: none; background: none; padding: 0; cursor: pointer; font-size: inherit;">Logg ut</button>
                </form>
            </li>
            <li>
                <button id="theme-toggle" type="button" class="secondary outline" aria-label="Bytt til morkt tema"
                        aria-pressed="false" title="Bytt tema">
                    <span data-theme-icon aria-hidden="true"></span>
                </button>
            </li>

        </ul>
    </nav>
</header>
<script th:src="@{/js/minimal-theme-switcher.js}"></script>
</body>
</html>
